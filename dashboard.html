<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareerAI - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{--bg:#050a14;--surface:#0d1829;--card:#111f35;--accent:#00d4ff;--accent2:#7b2fff;--accent3:#ff6b35;--text:#e8f0fe;--muted:#8899aa;--border:rgba(0,212,255,0.15);--success:#00e676}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
  nav{position:fixed;top:0;width:100%;z-index:100;padding:18px 60px;display:flex;justify-content:space-between;align-items:center;background:rgba(5,10,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);text-decoration:none}.logo span{color:var(--accent2)}
  .main{padding:90px 60px 60px;max-width:1200px;margin:0 auto}
  .page-title{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:32px}
  .page-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px}
  .stat-card .label{color:var(--muted);font-size:13px;font-weight:500;margin-bottom:8px}
  .stat-card .value{font-family:'Syne',sans-serif;font-size:36px;font-weight:800}
  .stat-card .value.blue{color:var(--accent)}
  .stat-card .value.purple{color:#b67fff}
  .stat-card .value.green{color:var(--success)}
  .stat-card .value.orange{color:var(--accent3)}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px}
  .chart-card h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px}
  .table-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;overflow:hidden}
  .table-card h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:10px 14px;border-bottom:1px solid var(--border)}
  td{padding:14px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(0,212,255,0.03)}
  .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .badge.blue{background:rgba(0,212,255,0.1);color:var(--accent)}
  .badge.green{background:rgba(0,230,118,0.1);color:var(--success)}
  footer{background:var(--surface);padding:24px 60px;border-top:1px solid var(--border);text-align:center;color:var(--muted);font-size:13px;margin-top:40px}
  @media(max-width:768px){nav{padding:16px 20px}.main{padding:80px 20px 40px}.stats-row{grid-template-columns:1fr 1fr}.charts-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Career<span>AI</span></a>
  <a href="predict.html" style="background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:600">+ New Prediction</a>
</nav>

<div class="main">
  <div class="page-title">📊 Analytics <span>Dashboard</span></div>

  <div class="stats-row">
    <div class="stat-card"><div class="label">Total Predictions</div><div class="value blue" id="total">--</div></div>
    <div class="stat-card"><div class="label">Model Accuracy</div><div class="value green">87.4%</div></div>
    <div class="stat-card"><div class="label">Careers Covered</div><div class="value purple">10</div></div>
    <div class="stat-card"><div class="label">Avg Confidence</div><div class="value orange" id="avg-conf">--</div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>🎯 Career Distribution</h3>
      <canvas id="careerChart" height="220"></canvas>
    </div>
    <div class="chart-card">
      <h3>📈 Model Performance</h3>
      <canvas id="perfChart" height="220"></canvas>
    </div>
  </div>

  <div class="table-card">
    <h3>🕐 Recent Predictions</h3>
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Predicted Career</th><th>Confidence</th><th>Date</th></tr></thead>
      <tbody id="recent-table"></tbody>
    </table>
  </div>
</div>

<footer><p>🤖 CareerAI Dashboard — Powered by Python ML | SQLite Database</p></footer>

<script>
  // Sample data for demo
  const careerData = {
    labels:['AI/ML','Software Dev','Cloud','Data Sci','DevOps','Full Stack','QA','UI/UX','PM','BA'],
    values:[28,22,16,14,8,6,3,1,1,1]
  };
  const recentPredictions = [
    {name:'Priya Sharma',career:'AI/ML Engineer',conf:'91.2%',date:'2025-01-15'},
    {name:'Rahul Kumar',career:'Software Developer',conf:'87.5%',date:'2025-01-15'},
    {name:'Anjali Verma',career:'Cloud Engineer',conf:'84.3%',date:'2025-01-14'},
    {name:'Vikram Singh',career:'Data Scientist',conf:'89.1%',date:'2025-01-14'},
    {name:'Neha Patel',career:'DevOps Engineer',conf:'82.7%',date:'2025-01-13'},
  ];

  async function loadStats() {
    try {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('total').textContent = data.total_predictions || '0';
      if(data.recent_predictions && data.recent_predictions.length) {
        const avgConf = data.recent_predictions.reduce((a,b)=>a+(b.confidence||0),0)/data.recent_predictions.length;
        document.getElementById('avg-conf').textContent = avgConf.toFixed(1)+'%';
        const tbody = document.getElementById('recent-table');
        data.recent_predictions.forEach((r,i)=>{
          tbody.innerHTML += `<tr>
            <td>${i+1}</td><td><strong>${r.name||'User'}</strong></td>
            <td><span class="badge blue">${r.career}</span></td>
            <td><span class="badge green">${(r.confidence||0).toFixed(1)}%</span></td>
            <td>${r.date||'--'}</td>
          </tr>`;
        });
        return;
      }
    } catch(e) {}
    // Demo fallback
    document.getElementById('total').textContent = '1,247';
    document.getElementById('avg-conf').textContent = '87.2%';
    const tbody = document.getElementById('recent-table');
    recentPredictions.forEach((r,i)=>{
      tbody.innerHTML += `<tr>
        <td>${i+1}</td><td><strong>${r.name}</strong></td>
        <td><span class="badge blue">${r.career}</span></td>
        <td><span class="badge green">${r.conf}</span></td>
        <td>${r.date}</td>
      </tr>`;
    });
  }
  loadStats();

  // Chart 1 - Career Distribution (Doughnut)
  new Chart(document.getElementById('careerChart'), {
    type:'doughnut',
    data:{
      labels:careerData.labels,
      datasets:[{data:careerData.values,backgroundColor:['#00d4ff','#7b2fff','#ff6b35','#00e676','#ffc107','#ff4081','#40c4ff','#b39ddb','#80cbc4','#ffcc02'],borderWidth:0,hoverOffset:8}]
    },
    options:{plugins:{legend:{position:'right',labels:{color:'#8899aa',font:{size:11},boxWidth:12}}},cutout:'65%'}
  });

  // Chart 2 - Model Performance
  new Chart(document.getElementById('perfChart'), {
    type:'bar',
    data:{
      labels:['RF','GB','SVM','KNN','NB'],
      datasets:[{label:'Accuracy %',data:[87.4,85.2,81.3,78.6,72.1],backgroundColor:['#00d4ff','#7b2fff','#ff6b35','#00e676','#8899aa'],borderRadius:8,borderSkipped:false}]
    },
    options:{
      scales:{y:{min:60,max:100,ticks:{color:'#8899aa'},grid:{color:'rgba(255,255,255,0.05)'}},x:{ticks:{color:'#8899aa'},grid:{display:false}}},
      plugins:{legend:{display:false}}
    }
  });
</script>
</body>
</html>
